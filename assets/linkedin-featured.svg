<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090e"/>
      <stop offset="60%" stop-color="#0d0f18"/>
      <stop offset="100%" stop-color="#0a0c15"/>
    </linearGradient>

    <!-- Red glow for accent lines -->
    <filter id="redGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="nameGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid fade mask -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="70%" stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1200" height="628" fill="url(#gridFade)"/>
    </mask>

    <!-- Circle glow -->
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e5181a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e5181a" stop-opacity="0"/>
    </radialGradient>

    <!-- Right panel gradient -->
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111320"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>

    <!-- Shine on brand plate -->
    <linearGradient id="plateShin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3a3c"/>
      <stop offset="100%" stop-color="#c0000a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g mask="url(#gridMask)">
    <!-- Vertical lines -->
    <line x1="150" y1="0" x2="150" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1050" y1="0" x2="1050" y2="628" stroke="#ffffff" stroke-width="0.5"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="314" x2="1200" y2="314" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="428" x2="1200" y2="428" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="528" x2="1200" y2="528" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Red radial glow behind left content -->
  <ellipse cx="200" cy="320" rx="320" ry="280" fill="url(#circleGlow)" opacity="0.6"/>

  <!-- Left red vertical accent bar -->
  <rect x="72" y="0" width="3" height="628" fill="#e5181a" filter="url(#redGlow)" opacity="0.9"/>

  <!-- Top red horizontal accent -->
  <rect x="0" y="0" width="1200" height="3" fill="#e5181a" opacity="0.5"/>
  <!-- Bottom red accent -->
  <rect x="0" y="625" width="1200" height="3" fill="#e5181a" opacity="0.3"/>

  <!-- ── YD Brand plate ── -->
  <!-- Parallelogram: skewed rect via polygon -->
  <polygon points="104,56 200,56 192,92 96,92" fill="url(#plateShin)"/>
  <text x="148" y="80" font-family="'Sora',sans-serif" font-weight="900" font-size="18" fill="white" text-anchor="middle" letter-spacing="3">YD</text>

  <!-- ── Main name ── -->
  <text x="104" y="210" font-family="'Sora','Space Grotesk',sans-serif" font-weight="800" font-size="68" fill="#e8ebf4" filter="url(#nameGlow)" letter-spacing="-1">Yash</text>
  <text x="104" y="288" font-family="'Sora','Space Grotesk',sans-serif" font-weight="800" font-size="68" fill="#e8ebf4" filter="url(#nameGlow)" letter-spacing="-1">Chetan Doshi</text>

  <!-- Red underline accent under name -->
  <rect x="104" y="302" width="320" height="3" fill="#e5181a" rx="2" filter="url(#redGlow)"/>

  <!-- ── Role tags ── -->
  <!-- Tag 1: Data Engineering -->
  <rect x="104" y="326" width="210" height="34" rx="6" fill="rgba(229,24,26,0.12)" stroke="#e5181a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="209" y="349" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13" fill="#e5181a" text-anchor="middle" letter-spacing="0.5">Data Engineering</text>

  <!-- Tag 2: AI / ML -->
  <rect x="326" y="326" width="130" height="34" rx="6" fill="rgba(0,192,212,0.1)" stroke="#00c0d4" stroke-width="1" stroke-opacity="0.35"/>
  <text x="391" y="349" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13" fill="#00c0d4" text-anchor="middle" letter-spacing="0.5">AI · ML</text>

  <!-- Tag 3: Full Stack -->
  <rect x="468" y="326" width="120" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="528" y="349" font-family="'Space Grotesk',sans-serif" font-weight="600" font-size="13" fill="#9aa3b8" text-anchor="middle" letter-spacing="0.5">Full Stack</text>

  <!-- ── Key stats row ── -->
  <!-- GPA -->
  <text x="104" y="418" font-family="'JetBrains Mono','Space Grotesk',monospace" font-weight="400" font-size="11" fill="#7a8499" letter-spacing="1">GPA</text>
  <text x="104" y="442" font-family="'Sora',sans-serif" font-weight="700" font-size="28" fill="#e8ebf4">3.96</text>
  <text x="165" y="442" font-family="'Space Grotesk',sans-serif" font-size="11" fill="#7a8499">/4.0</text>

  <!-- Divider -->
  <line x1="210" y1="415" x2="210" y2="448" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Publications -->
