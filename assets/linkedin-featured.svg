  <text x="886" y="573" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9aa3b8" text-anchor="middle">AWS</text>

  <rect x="916" y="558" width="62" height="22" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="947" y="573" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9aa3b8" text-anchor="middle">Spark</text>

