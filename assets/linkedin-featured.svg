  <text x="228" y="442" font-family="'Sora',sans-serif" font-weight="700" font-size="28" fill="#e8ebf4">3</text>
  <text x="253" y="442" font-family="'Space Grotesk',sans-serif" font-size="11" fill="#7a8499">peer-reviewed</text>

  <!-- Divider -->
  <line x1="380" y1="415" x2="380" y2="448" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- University -->
  <text x="398" y="418" font-family="'JetBrains Mono','Space Grotesk',monospace" font-weight="400" font-size="11" fill="#7a8499" letter-spacing="1">UNIVERSITY</text>
  <text x="398" y="442" font-family="'Sora',sans-serif" font-weight="700" font-size="18" fill="#e8ebf4">Texas A&amp;M</text>
  <text x="398" y="460" font-family="'Space Grotesk',sans-serif" font-size="11" fill="#7a8499">M.S. MIS · 2027</text>

  <!-- ── Tesla internship badge ── -->
  <rect x="104" y="488" width="340" height="52" rx="10" fill="rgba(229,24,26,0.07)" stroke="#e5181a" stroke-width="1" stroke-opacity="0.3"/>
