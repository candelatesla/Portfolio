  <!-- Skill chips -->
  <rect x="740" y="558" width="66" height="22" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="773" y="573" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9aa3b8" text-anchor="middle">Python</text>

