  <text x="154" y="530" font-family="'Space Grotesk',sans-serif" font-size="12" fill="#7a8499">Tesla · May – Dec 2026</text>

  <!-- ── URL pill at bottom ── -->
  <rect x="104" y="566" width="270" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="239" y="585" font-family="'JetBrains Mono',monospace" font-size="12" fill="#7a8499" text-anchor="middle">yashdoshi.vercel.app</text>

  <!-- ══════ RIGHT PANEL ══════ -->
  <!-- Panel background -->
  <rect x="700" y="0" width="500" height="628" fill="url(#rightPanel)"/>
