  <rect x="740" y="100" width="420" height="90" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="740" y="100" width="3" height="90" rx="1" fill="#e5181a"/>
  <text x="762" y="126" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#e8ebf4">AetherMart — Unified Data &amp; AI Platform</text>
  <text x="762" y="146" font-family="'Space Grotesk',sans-serif" font-size="12" fill="#7a8499">AWS · MongoDB · Python · Vector Search · Tableau</text>
  <rect x="762" y="160" width="56" height="20" rx="4" fill="rgba(229,24,26,0.12)" stroke="#e5181a" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="790" y="174" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#e5181a" text-anchor="middle">Data</text>
  <rect x="826" y="160" width="36" height="20" rx="4" fill="rgba(0,192,212,0.1)" stroke="#00c0d4" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="844" y="174" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#00c0d4" text-anchor="middle">AI</text>

  <!-- Card 2 -->
  <rect x="740" y="206" width="420" height="90" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="740" y="206" width="3" height="90" rx="1" fill="#00c0d4"/>
  <text x="762" y="232" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#e8ebf4">Jarvis — AI Portfolio Assistant</text>
  <text x="762" y="252" font-family="'Space Grotesk',sans-serif" font-size="12" fill="#7a8499">Groq · LLaMA 3.3 70B · RAG · Vercel Serverless</text>
  <rect x="762" y="266" width="40" height="20" rx="4" fill="rgba(0,192,212,0.1)" stroke="#00c0d4" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="782" y="280" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#00c0d4" text-anchor="middle">AI</text>

  <!-- Card 3 -->
  <rect x="740" y="312" width="420" height="90" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="740" y="312" width="3" height="90" rx="1" fill="#f59e0b"/>
  <text x="762" y="338" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#e8ebf4">CMIS Engagement Platform</text>
  <text x="762" y="358" font-family="'Space Grotesk',sans-serif" font-size="12" fill="#7a8499">Full-Stack · AI Matching · Texas A&amp;M</text>
  <rect x="762" y="372" width="64" height="20" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <text x="794" y="386" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#9aa3b8" text-anchor="middle">Full Stack</text>

  <!-- Research section -->
  <text x="740" y="436" font-family="'JetBrains Mono',monospace" font-size="10" fill="#7a8499" letter-spacing="2">RESEARCH</text>
  <line x1="820" y1="430" x2="1160" y2="430" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Research item 1 -->
  <rect x="740" y="448" width="8" height="8" rx="1" fill="#00c0d4" opacity="0.8"/>
  <text x="758" y="458" font-family="'Space Grotesk',sans-serif" font-size="12" fill="#9aa3b8">IEEE Xplore · AI-Powered Student Performance Prediction</text>

  <!-- Research item 2 -->
