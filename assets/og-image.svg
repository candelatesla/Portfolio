<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Yash Doshi Portfolio</title>
  <desc id="desc">Open Graph image for Yash Doshi's portfolio website.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f17" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <radialGradient id="glowA" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ff5b3d" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ff5b3d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="75%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.05" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <g transform="translate(88 88)">
    <rect x="0" y="0" width="110" height="64" rx="28" fill="none" stroke="#f8fafc" stroke-opacity="0.18" stroke-width="2" />
    <text x="55" y="42" fill="#f8fafc" font-family="Space Grotesk, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">YD</text>

    <text x="0" y="218" fill="#ff7a45" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">AI • DATA • FULL-STACK</text>
    <text x="0" y="332" fill="#f8fafc" font-family="Sora, Arial, sans-serif" font-size="82" font-weight="700">Yash Doshi</text>
    <text x="0" y="404" fill="#cbd5e1" font-family="Space Grotesk, Arial, sans-serif" font-size="34" font-weight="500">Graduate student and engineer building intelligent, data-intensive software.</text>

    <rect x="0" y="462" width="590" height="68" rx="34" fill="#ffffff" fill-opacity="0.04" stroke="#ff5b3d" stroke-opacity="0.55" />
    <text x="34" y="506" fill="#f8fafc" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="600">Projects • Experience • Research • Contact</text>
  </g>
</svg>
